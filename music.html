  <script>
    (function() {
      function getSpotifyEmbed(url, type) {
        // Extract ID from Spotify URLs like:
        // https://open.spotify.com/playlist/ID?si=...
        // https://open.spotify.com/track/ID?si=...
        // https://open.spotify.com/album/ID?si=...
        const match = url.match(/open\.spotify\.com\/(playlist|track|album)\/([a-zA-Z0-9]+)/);
        if (!match) return null;

        const spotifyType = match[1]; // playlist, track, or album
        const id = match[2];
        let height = 352;
        if (spotifyType === 'track') {
          height = 152;
        }

        return {
          src: 'https://open.spotify.com/embed/' + spotifyType + '/' + id,
          height: height
        };
      }

      function getSoundCloudEmbed(url, type) {
        const encodedUrl = encodeURIComponent(url);
        const height = (type === 'playlist' || url.includes('/sets/')) ? 300 : 166;
        return {
          src: 'https://w.soundcloud.com/player/?url=' + encodedUrl + '&color=%235c3d2e&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false',
          height: height
        };
      }

      function getYouTubeEmbed(url) {
        // Extract video ID from various YouTube URL formats
        let videoId = null;
        const patterns = [
          /[?&]v=([a-zA-Z0-9_-]{11})/,
          /youtu\.be\/([a-zA-Z0-9_-]{11})/,
          /embed\/([a-zA-Z0-9_-]{11})/
        ];
        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) {
            videoId = match[1];
            break;
          }
        }
        if (!videoId) return null;

        return {
          src: 'https://www.youtube.com/embed/' + videoId,
          height: 200
        };
      }

      function getEmbed(item) {
        switch (item.platform) {
          case 'spotify':
            return getSpotifyEmbed(item.url, item.type);
          case 'soundcloud':
            return getSoundCloudEmbed(item.url, item.type);
          case 'youtube':
            return getYouTubeEmbed(item.url);
          default:
            return null;
        }
      }

      function createMusicCard(item) {
        const embed = getEmbed(item);
        if (!embed) return null;

        const card = document.createElement('div');
        card.className = 'music-card fade-in';

        const title = document.createElement('h3');
        title.textContent = item.title;
        card.appendChild(title);

        const iframe = document.createElement('iframe');
        iframe.style.borderRadius = '12px';
        iframe.src = embed.src;
        iframe.width = '100%';
        iframe.height = embed.height;
        iframe.frameBorder = '0';
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('allow', 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture');
        iframe.loading = 'lazy';
        card.appendChild(iframe);

        return card;
      }

      function observeFadeIn() {
        const cards = document.querySelectorAll('.music-card.fade-in');
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });

        cards.forEach(function(card) {
          observer.observe(card);
        });
      }

      function loadMusic() {
        const grid = document.getElementById('music-grid');
        const loading = document.getElementById('music-loading');

        fetch(cmsUrl('music'))
          .then(function(response) {
            if (!response.ok) throw new Error('Hindi ma-fetch ang data');
            return response.json();
          })
          .then(function(data) {
            const items = data.music || [];

            // Remove loading
            if (loading) loading.remove();

            if (items.length === 0) {
              grid.innerHTML = '<div class="music-loading"><p>Wala pang music dito... parang playlist ko pag walang wifi 😅</p></div>';
              return;
            }

            items.forEach(function(item) {
              const card = createMusicCard(item);
              if (card) grid.appendChild(card);
            });

            // Setup fade-in animations
            observeFadeIn();
          })
          .catch(function(err) {
            console.error('Error loading music:', err);
            if (loading) loading.remove();
            grid.innerHTML = '<div class="music-loading"><p>Ay may error sa pag-load ng music. Baka nag-iinarte yung internet mo lol 🙃</p></div>';
          });
      }

      // Start loading when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadMusic);
      } else {
        loadMusic();
      }
    })();
  </script>
</body>
