  <!-- Page Header -->
  <header class="page-header">
    <h1>Mga Tots Ko 💭</h1>
    <p>brain dump hours. mga bagay na tumatakbo sa utak ko na wala namang papuntahan</p>
  </header>

  <!-- Tots Content -->
  <section class="section">
    <div class="tots-grid" id="tots-grid">
      <div class="tots-loading" id="tots-loading">
        <p>loading mga tots... sandali lang ha</p>
      </div>
    </div>
  </section>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1-L_RdSX8rsLNTGWaF1Agi-U9Bhd7qmWdHXPYZxXm9lG8H32cl-t5urFSOVuKORHE9EynIgQ6n_i3/pub?output=csv';

    function parseCSV(csvText) {
      const rows = [];
      let current = '';
      let inQuotes = false;
      let row = [];

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (inQuotes) {
          if (char === '"' && next === '"') {
            current += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            current += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(current.trim());
            current = '';
          } else if (char === '\n' || (char === '\r' && next === '\n')) {
            row.push(current.trim());
            current = '';
            if (row.length > 0 && row.some(cell => cell !== '')) {
              rows.push(row);
            }
            row = [];
            if (char === '\r') i++;
          } else {
            current += char;
          }
        }
      }

      // Handle last row
      if (current || row.length > 0) {
        row.push(current.trim());
        if (row.some(cell => cell !== '')) {
          rows.push(row);
        }
      }

      return rows;
    }

    function createTotCard(thought, tags, date) {
      const card = document.createElement('div');
      card.className = 'tot-card fade-in';

      const meta = document.createElement('div');
      meta.className = 'tot-meta';
      meta.textContent = date || '';

      const p = document.createElement('p');
      p.textContent = thought;

      card.appendChild(meta);
      card.appendChild(p);

      if (tags) {
        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'tot-tags';
        const tagList = tags.split(',');
        tagList.forEach(tag => {
          const span = document.createElement('span');
          const trimmed = tag.trim();
          span.textContent = trimmed.startsWith('#') ? trimmed : '#' + trimmed;
          tagsDiv.appendChild(span);
        });
        card.appendChild(tagsDiv);
      }

      return card;
    }

    function observeFadeIn(elements) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
      });

      elements.forEach(el => observer.observe(el));
    }

    async function loadTots() {
      const grid = document.getElementById('tots-grid');
      const loading = document.getElementById('tots-loading');

      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error('Failed to fetch');

        const csvText = await response.text();
        const rows = parseCSV(csvText);

        // Remove header row
        if (rows.length > 0) {
          rows.shift();
        }

        // Remove loading
        loading.remove();

        if (rows.length === 0) {
          grid.innerHTML = '<div class="tots-empty"><p>wala pang tots dito... babalik ako soon!</p></div>';
          return;
        }

        // First row after header = newest, display in order
        const cards = [];
        rows.forEach(row => {
          const thought = row[0] || '';
          const tags = row[1] || '';
          const date = row[2] || '';

          if (thought) {
            const card = createTotCard(thought, tags, date);
            grid.appendChild(card);
            cards.push(card);
          }
        });

        // Observe all new cards for fade-in animation
        observeFadeIn(cards);

      } catch (error) {
        loading.remove();
        grid.innerHTML = '<div class="tots-empty"><p>ay sorry, di ko ma-load yung mga tots ko right now. try mo ulit mamaya!</p></div>';
      }
    }

    loadTots();
  </script>

</body>
