<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Chamber - Carla</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .echo-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--brown);
      padding: 6rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .echo-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--white);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .echo-header p {
      color: var(--brown-lighter);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }
    .echo-input-wrap {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .echo-input {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid var(--brown-light);
      border-radius: 30px;
      padding: 0.85rem 1.5rem;
      font-size: 1.1rem;
      color: var(--white);
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
      width: 220px;
      text-align: center;
    }
    .echo-input::placeholder {
      color: var(--brown-light);
      opacity: 0.7;
    }
    .echo-input:focus {
      border-color: var(--pink);
      background: rgba(255, 255, 255, 0.12);
    }
    .echo-submit {
      background: var(--pink);
      color: var(--brown);
      border: none;
      border-radius: 30px;
      padding: 0.85rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
    }
    .echo-submit:hover {
      background: var(--pink-light);
      transform: translateY(-2px);
    }
    .echo-display {
      position: relative;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .echo-word {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 700;
      color: var(--white);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.6s ease, transform 0.6s ease;
      position: absolute;
      text-shadow: 0 0 40px rgba(232, 160, 191, 0.3);
    }
    .echo-word.echo-visible {
      opacity: 1;
      transform: scale(1);
    }
    .echo-word.echo-fading {
      opacity: 0;
      transform: scale(1.1);
      transition: opacity 2s ease, transform 2s ease;
    }
    .echo-hint {
      color: var(--brown-light);
      font-size: 0.85rem;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .echo-hint.visible {
      opacity: 1;
    }

    /* ===== Keyword effects ===== */

    /* love: hearts floating up */
    .echo-fx-heart {
      position: fixed;
      bottom: -3rem;
      font-size: 2rem;
      pointer-events: none;
      z-index: 1000;
      will-change: transform, opacity;
      animation: echo-float-up 3s ease-in forwards;
    }
    @keyframes echo-float-up {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(-105vh) scale(1.25); opacity: 0; }
    }

    /* birthday: cake drop + confetti */
    .echo-fx-cake {
      position: fixed;
      top: -5rem;
      left: 50%;
      margin-left: -2.5rem;
      font-size: 5rem;
      pointer-events: none;
      z-index: 1001;
      animation: echo-cake-drop 3s cubic-bezier(0.5, 0, 0.5, 1) forwards;
    }
    @keyframes echo-cake-drop {
      0% { transform: translateY(0); opacity: 0; }
      12% { opacity: 1; }
      55% { transform: translateY(38vh); }
      70% { transform: translateY(33vh); }
      85% { transform: translateY(36vh); opacity: 1; }
      100% { transform: translateY(36vh); opacity: 0; }
    }

    .echo-fx-confetti {
      position: fixed;
      top: -1rem;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 1000;
      will-change: transform, opacity;
      animation: echo-confetti-fall linear forwards;
    }
    @keyframes echo-confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0.2; }
    }

    /* missu: centered popup */
    .echo-fx-missu {
      position: fixed;
      top: 50%;
      left: 50%;
      font-style: italic;
      font-weight: 600;
      color: var(--pink);
      font-size: clamp(1.5rem, 5vw, 3rem);
      text-shadow: 0 0 24px rgba(232, 160, 191, 0.5);
      z-index: 1002;
      pointer-events: none;
      white-space: nowrap;
      animation: echo-missu-pop 3s ease forwards;
    }
    @keyframes echo-missu-pop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06); }
    }

    /* hi / hello: rickroll overlay */
    .echo-fx-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: echo-overlay-in 0.4s ease forwards;
    }
    @keyframes echo-overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .echo-fx-overlay iframe {
      width: min(90vw, 820px);
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
    }
    .echo-fx-overlay-hint {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Echo Chamber -->
  <div class="echo-page">
    <div class="echo-header">
      <h1>Echo Chamber</h1>
      <p>Type a word. Watch it disappear.</p>
    </div>
    <div class="echo-input-wrap">
      <input type="text" class="echo-input" id="echo-input" placeholder="one word..." maxlength="20" autocomplete="off">
      <button class="echo-submit" id="echo-submit">release it</button>
    </div>
    <div class="echo-display" id="echo-display">
      <span class="echo-word" id="echo-word"></span>
    </div>
    <p class="echo-hint" id="echo-hint">it's gone now. like it was never here.</p>
  </div>
  <!-- Footer -->
  <footer class="footer" style="background: var(--brown); border-top-color: var(--brown-light);">
    <p style="color: var(--brown-lighter);">made with <span class="footer-heart">&hearts;</span> by carla &middot; 2024</p>
  </footer>
  <script src="cms-config.js"></script>
  <script src="script.js"></script>
  <script src="translate.js"></script>
  <script>
    (function() {
      var input = document.getElementById('echo-input');
      var btn = document.getElementById('echo-submit');
      var wordEl = document.getElementById('echo-word');
      var hint = document.getElementById('echo-hint');
      var timeout = null;
      // Color keywords
      var colorMap = {
        'red': '#e74c3c',
        'orange': '#f39c12',
        'yellow': '#f1c40f',
        'green': '#2ecc71',
        'blue': '#3498db',
        'indigo': '#6c5ce7',
        'violet': '#9b59b6'
      };

      // Rainbow popup
      var rainbowPopup = null;

      function showRainbowPopup() {
        if (rainbowPopup) rainbowPopup.remove();
        rainbowPopup = document.createElement('div');
        rainbowPopup.textContent = 'bading ka no?';
        rainbowPopup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#e74c3c,#f39c12,#f1c40f,#2ecc71,#3498db,#6c5ce7,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:clamp(1.5rem,5vw,3rem);font-weight:700;z-index:999;opacity:0;transition:opacity 0.4s ease;pointer-events:none;text-align:center;';
        document.body.appendChild(rainbowPopup);
        setTimeout(function() { rainbowPopup.style.opacity = '1'; }, 50);
        setTimeout(function() {
          rainbowPopup.style.opacity = '0';
          setTimeout(function() { if (rainbowPopup) rainbowPopup.remove(); }, 500);
        }, 3000);
      }

      // love: 15 hearts float up from the bottom across random x positions
      function triggerHearts() {
        for (var i = 0; i < 15; i++) {
          var heart = document.createElement('span');
          heart.className = 'echo-fx-heart';
          heart.textContent = '\u2764\uFE0F';
          heart.style.left = (Math.random() * 96) + 'vw';
          heart.style.fontSize = (1.4 + Math.random() * 1.6) + 'rem';
          heart.style.animationDelay = (Math.random() * 0.6) + 's';
          document.body.appendChild(heart);
          (function(el) {
            setTimeout(function() { el.remove(); }, 3800);
          })(heart);
        }
      }

      // birthday: cake drops from top center + confetti rains down
      function triggerBirthday() {
        var cake = document.createElement('div');
        cake.className = 'echo-fx-cake';
        cake.textContent = '\uD83C\uDF82';
        document.body.appendChild(cake);
        setTimeout(function() { cake.remove(); }, 3200);

        var colors = ['#e74c3c', '#f39c12', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e8a0bf'];
        for (var i = 0; i < 45; i++) {
          var piece = document.createElement('div');
          piece.className = 'echo-fx-confetti';
          piece.style.left = (Math.random() * 100) + 'vw';
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDuration = (2 + Math.random() * 1.3) + 's';
          piece.style.animationDelay = (Math.random() * 0.7) + 's';
          if (Math.random() > 0.5) piece.style.borderRadius = '2px';
          document.body.appendChild(piece);
          (function(el) {
            setTimeout(function() { el.remove(); }, 4200);
          })(piece);
        }
      }

      // missu: centered italic pink popup that fades after 3s
      function triggerMissU() {
        var popup = document.createElement('div');
        popup.className = 'echo-fx-missu';
        popup.textContent = 'miss ka ba?';
        document.body.appendChild(popup);
        setTimeout(function() { popup.remove(); }, 3200);
      }

      // hi / hello: dark overlay with an autoplaying rickroll, click to close
      function triggerRickroll() {
        var overlay = document.createElement('div');
        overlay.className = 'echo-fx-overlay';

        var iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/Aq5WXmQQooo?autoplay=1';
        iframe.allow = 'autoplay; encrypted-media';
        iframe.setAttribute('allowfullscreen', '');
        overlay.appendChild(iframe);

        var closeHint = document.createElement('div');
        closeHint.className = 'echo-fx-overlay-hint';
        closeHint.textContent = 'click anywhere to close';
        overlay.appendChild(closeHint);

        overlay.addEventListener('click', function() {
          overlay.remove();
        });

        document.body.appendChild(overlay);
      }

      function echoWord() {
        var word = input.value.trim().split(/\s+/)[0]; // only first word
        if (!word) return;
        input.value = '';
        hint.classList.remove('visible');

        var lowerWord = word.toLowerCase();

        // Check for rainbow keyword
        if (lowerWord === 'rainbow') {
          showRainbowPopup();
        }

        // Extra keyword effects (in addition to the normal echo)
        if (lowerWord === 'love') {
          triggerHearts();
        }
        if (lowerWord === 'birthday') {
          triggerBirthday();
        }
        if (lowerWord === 'missu') {
          triggerMissU();
        }
        if (lowerWord === 'hi' || lowerWord === 'hello') {
          triggerRickroll();
        }

        // Check for color keyword
        var echoColor = colorMap[lowerWord] || '#ffffff';

        // Reset
        wordEl.classList.remove('echo-visible', 'echo-fading');
        void wordEl.offsetWidth;
        wordEl.textContent = word;
        wordEl.style.color = echoColor;
        if (lowerWord === 'rainbow') {
          wordEl.style.cssText += ';background:linear-gradient(135deg,#e74c3c,#f39c12,#f1c40f,#2ecc71,#3498db,#6c5ce7,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;';
        } else {
          wordEl.style.background = 'none';
          wordEl.style.webkitBackgroundClip = 'unset';
          wordEl.style.webkitTextFillColor = echoColor;
          wordEl.style.backgroundClip = 'unset';
        }
        wordEl.classList.add('echo-visible');

        if (timeout) clearTimeout(timeout);
        timeout = setTimeout(function() {
          wordEl.classList.add('echo-fading');
          wordEl.classList.remove('echo-visible');
          setTimeout(function() {
            wordEl.textContent = '';
            wordEl.classList.remove('echo-fading');
            wordEl.style.color = '#ffffff';
            wordEl.style.background = 'none';
            wordEl.style.webkitBackgroundClip = 'unset';
            wordEl.style.webkitTextFillColor = '#ffffff';
            hint.classList.add('visible');
          }, 2000);
        }, 3000);
      }
      btn.addEventListener('click', echoWord);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') echoWord();
      });
    })();
  </script>
</body>
