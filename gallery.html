  <script src="cms-config.js"></script>
  <script>
    function convertImageUrl(url) {
      if (!url) return '';

      // Handle CMS-relative /cdn/ URLs (R2 uploads)
      const cmsOrigin = CMS_CONFIG.baseUrl.replace('/api/public', '');
      if (url.startsWith('/cdn/')) {
        return cmsOrigin + url;
      }

      // Handle drive.google.com/file/d/FILE_ID/view format
      const driveFileMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
      if (driveFileMatch) {
        return 'https://lh3.googleusercontent.com/d/' + driveFileMatch[1];
      }

      // Handle drive.google.com/open?id=FILE_ID format
      const driveOpenMatch = url.match(/drive\.google\.com\/open\?id=([^&\?]+)/);
      if (driveOpenMatch) {
        return 'https://lh3.googleusercontent.com/d/' + driveOpenMatch[1];
      }

      // Direct URL (imgur, etc.) - use as-is
      return url;
    }

    function getYouTubeVideoId(url) {
      if (!url) return null;
      // Match youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/.*[?&]v=([a-zA-Z0-9_-]{11})/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }
      return null;
    }

    function getDriveVideoId(url) {
      if (!url) return null;
      const driveFileMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
      if (driveFileMatch) return driveFileMatch[1];
      const driveOpenMatch = url.match(/drive\.google\.com\/open\?id=([^&\?]+)/);
      if (driveOpenMatch) return driveOpenMatch[1];
      return null;
    }

    function isYouTubeUrl(url) {
      return /youtube\.com|youtu\.be/.test(url);
    }

    function isDriveUrl(url) {
      return /drive\.google\.com/.test(url);
    }

    function createPhotoItem(imageUrl, caption) {
      const item = document.createElement('div');
      item.className = 'gallery-item fade-in';

      const img = document.createElement('img');
      img.src = convertImageUrl(imageUrl);
      img.alt = caption || 'Photo';
      img.loading = 'lazy';
      item.appendChild(img);

      if (caption) {
        const overlay = document.createElement('div');
        overlay.className = 'gallery-caption';
        overlay.textContent = caption;
        item.appendChild(overlay);
      }

      return item;
    }

    function createVideoItem(url, caption) {
      const item = document.createElement('div');
      item.className = 'gallery-item gallery-video-item fade-in';

      const embedWrapper = document.createElement('div');
      embedWrapper.className = 'gallery-video-embed';

      const youtubeId = getYouTubeVideoId(url);
      const driveId = getDriveVideoId(url);

      if (youtubeId) {
        const iframe = document.createElement('iframe');
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('loading', 'lazy');
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
        iframe.src = 'https://www.youtube.com/embed/' + youtubeId;
        embedWrapper.appendChild(iframe);
      } else if (driveId) {
        const iframe = document.createElement('iframe');
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('loading', 'lazy');
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
        iframe.src = 'https://drive.google.com/file/d/' + driveId + '/preview';
        embedWrapper.appendChild(iframe);
      } else {
        // Direct video file (e.g. /cdn/ uploads from R2)
        const video = document.createElement('video');
        video.setAttribute('controls', '');
        video.setAttribute('preload', 'metadata');
        const cmsOrigin = CMS_CONFIG.baseUrl.replace('/api/public', '');
        video.src = url.startsWith('/cdn/') ? cmsOrigin + url : url;
        embedWrapper.appendChild(video);
      }

      item.appendChild(embedWrapper);

      if (caption) {
        const captionEl = document.createElement('div');
        captionEl.className = 'gallery-video-caption';
        captionEl.textContent = caption;
        item.appendChild(captionEl);
      }

      return item;
    }

    function observeFadeIn(elements) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
      });

      elements.forEach(el => observer.observe(el));
    }

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      const loading = document.getElementById('gallery-loading');

      try {
        const response = await fetch(cmsUrl('gallery'));
        if (!response.ok) throw new Error('Failed to fetch');

        const data = await response.json();
        const rows = data.gallery || [];

        // Remove loading
        loading.remove();

        if (rows.length === 0) {
          grid.innerHTML = '<div class="gallery-empty"><p>wala pang laman dito... mag-uupload ako soon, promise! cheka lang</p></div>';
          return;
        }

        const items = [];
        rows.forEach(function(row) {
          const url = row.url || '';
          const caption = row.caption || '';
          const type = (row.type || 'photo').toLowerCase().trim();

          if (!url) return;

          var item;
          if (type === 'video') {
            item = createVideoItem(url, caption);
          } else {
            item = createPhotoItem(url, caption);
          }

          grid.appendChild(item);
          items.push(item);
        });

        // Observe all new items for fade-in animation
        observeFadeIn(items);

      } catch (error) {
        loading.remove();
        grid.innerHTML = '<div class="gallery-empty"><p>ay nako, nag-iinarte yung internet mo lol. di ko ma-load yung gallery. try mo ulit mamaya ha!</p></div>';
      }
    }

    loadGallery();
  </script>
