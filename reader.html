<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader - Carla</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * { box-sizing: border-box; }

    body {
      background: #1a1210;
      color: #e8d5c4;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      overflow-x: hidden;
    }

    /* Reader Header */
    .reader-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.2rem;
      background: rgba(26, 18, 16, 0.95);
      border-bottom: 1px solid #3d2518;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .reader-header-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      background: #2a1f18;
      border: 1px solid #4a3528;
      border-radius: 6px;
      color: #c49b70;
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: inherit;
    }

    .back-btn:hover {
      background: #3d2a1e;
      color: #e8d5c4;
    }

    .reader-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e8d5c4;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .reader-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      background: #2a1f18;
      border: 1px solid #4a3528;
      border-radius: 6px;
      color: #c49b70;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .reader-btn:hover {
      background: #3d2a1e;
      color: #e8d5c4;
    }

    .reader-btn.active {
      background: #5a3e2a;
      color: #e8d5c4;
      border-color: #7a5c3e;
    }

    /* Page Counter */
    .page-counter {
      font-size: 0.8rem;
      color: #b68973;
      text-align: center;
      padding: 0.6rem;
      background: rgba(26, 18, 16, 0.9);
      border-top: 1px solid #3d2518;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    /* Canvas Container */
    .reader-viewport {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 110px);
      padding: 1.5rem;
      padding-bottom: 3.5rem;
      gap: 0.5rem;
      perspective: 1200px;
    }

    .page-wrapper {
      position: relative;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .page-wrapper canvas {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 140px);
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 60px rgba(139, 69, 19, 0.1);
    }

    /* Page flip animation */
    .page-wrapper.flip-left {
      animation: flipLeft 0.4s ease forwards;
    }

    .page-wrapper.flip-right {
      animation: flipRight 0.4s ease forwards;
    }

    @keyframes flipLeft {
      0% { transform: rotateY(0deg); opacity: 1; }
      50% { transform: rotateY(-15deg); opacity: 0.7; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    @keyframes flipRight {
      0% { transform: rotateY(0deg); opacity: 1; }
      50% { transform: rotateY(15deg); opacity: 0.7; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* Navigation Buttons */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 80px;
      background: rgba(42, 31, 24, 0.8);
      border: 1px solid #4a3528;
      border-radius: 8px;
      color: #c49b70;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 50;
    }

    .nav-btn:hover {
      background: rgba(61, 42, 30, 0.95);
      color: #e8d5c4;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-btn.prev { left: 0.5rem; }
    .nav-btn.next { right: 0.5rem; }

    /* Bookmark Panel */
    .bookmark-panel {
      position: fixed;
      top: 55px;
      right: -300px;
      width: 280px;
      max-height: calc(100vh - 100px);
      background: #2a1f18;
      border-left: 1px solid #4a3528;
      border-radius: 0 0 0 12px;
      z-index: 99;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 1rem;
    }

    .bookmark-panel.open {
      right: 0;
    }

    .bookmark-panel h3 {
      font-size: 0.95rem;
      color: #e8d5c4;
      margin-bottom: 0.8rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #4a3528;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
      font-size: 0.85rem;
      color: #c49b70;
    }

    .bookmark-item:hover {
      background: #3d2a1e;
      color: #e8d5c4;
    }

    .bookmark-item-remove {
      background: none;
      border: none;
      color: #b68973;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem;
    }

    .bookmark-item-remove:hover {
      color: #e74c3c;
    }

    .bookmark-empty {
      font-size: 0.8rem;
      color: #7a5c3e;
      text-align: center;
      padding: 1rem 0;
    }

    /* Dog-ear on current page */
    .dog-ear-indicator {
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent #c49b70 transparent transparent;
      cursor: pointer;
      z-index: 5;
      transition: border-color 0.2s ease;
    }

    .dog-ear-indicator:hover {
      border-color: transparent #e8d5c4 transparent transparent;
    }

    .dog-ear-indicator.bookmarked {
      border-color: transparent #e74c3c transparent transparent;
    }

    /* Ambient overlay */
    .ambient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s ease;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 6, 4, 0.6) 100%);
      mix-blend-mode: multiply;
    }

    .ambient-overlay.active {
      opacity: 1;
    }

    /* Warm light filter for ambient mode */
    body.ambient-mode {
      background: #0f0a08;
    }

    body.ambient-mode .reader-viewport {
      filter: sepia(0.08) brightness(0.95);
    }

    /* Loading */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #b68973;
      gap: 1rem;
    }

    .reader-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #3d2518;
      border-top-color: #c49b70;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .reader-error {
      text-align: center;
      padding: 3rem;
      color: #b68973;
    }

    .reader-error h2 {
      color: #e8d5c4;
      margin-bottom: 0.5rem;
    }

    /* Responsive: single page on mobile */
    @media (max-width: 768px) {
      .reader-viewport {
        padding: 0.8rem;
        padding-bottom: 3.5rem;
      }

      .page-wrapper canvas {
        max-height: calc(100vh - 130px);
      }

      .nav-btn {
        width: 36px;
        height: 60px;
        font-size: 1rem;
      }

      .reader-title {
        max-width: 120px;
        font-size: 0.8rem;
      }

      .bookmark-panel {
        width: 240px;
      }
    }
  </style>
</head>
<body>
  <!-- Ambient overlay -->
  <div class="ambient-overlay" id="ambient-overlay"></div>

  <!-- Header -->
  <div class="reader-header">
    <div class="reader-header-left">
      <a href="bookshelf.html" class="back-btn">&larr; Shelf</a>
      <span class="reader-title" id="reader-title">Loading...</span>
    </div>
    <div class="reader-header-right">
      <button class="reader-btn" id="bookmark-list-btn" title="Bookmarks">&#128278;</button>
      <button class="reader-btn" id="ambient-btn" title="Ambient Mode">&#128367;</button>
      <button class="reader-btn" id="fullscreen-btn" title="Fullscreen">&#9974;</button>
    </div>
  </div>

  <!-- Bookmark Panel -->
  <div class="bookmark-panel" id="bookmark-panel">
    <h3>&#128278; Bookmarks</h3>
    <div id="bookmark-list"></div>
  </div>

  <!-- Main Reader -->
  <div class="reader-viewport" id="reader-viewport">
    <div class="reader-loading" id="reader-loading">
      <div class="reader-loading-spinner"></div>
      <p>Loading your book... saglit lang ha</p>
    </div>
  </div>

  <!-- Page Navigation -->
  <button class="nav-btn prev" id="prev-btn" title="Previous Page">&lsaquo;</button>
  <button class="nav-btn next" id="next-btn" title="Next Page">&rsaquo;</button>

  <!-- Page Counter -->
  <div class="page-counter" id="page-counter">Page - of -</div>

  <script type="module">
    // PDF.js setup
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get('url');
    const bookTitle = params.get('title') || 'Untitled';
    const bookId = params.get('id') || 'unknown';

    document.getElementById('reader-title').textContent = bookTitle;
    document.title = bookTitle + ' - Reader';

    // State
    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isDesktop = window.innerWidth > 768;
    let isRendering = false;
    let bookmarkPanelOpen = false;
    let ambientMode = false;

    // Storage keys
    const PAGE_KEY = 'reader_page_' + bookId;
    const BOOKMARK_KEY = 'reader_bookmarks_' + bookId;

    // Get saved page
    function getSavedPage() {
      const saved = localStorage.getItem(PAGE_KEY);
      return saved ? parseInt(saved, 10) : 1;
    }

    function savePage(page) {
      localStorage.setItem(PAGE_KEY, page.toString());
    }

    // Bookmarks
    function getBookmarks() {
      try {
        return JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
      } catch(e) { return []; }
    }

    function saveBookmarks(bm) {
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bm));
    }

    function isPageBookmarked(page) {
      return getBookmarks().includes(page);
    }

    function togglePageBookmark(page) {
      let bm = getBookmarks();
      const idx = bm.indexOf(page);
      if (idx !== -1) {
        bm.splice(idx, 1);
      } else {
        bm.push(page);
        bm.sort(function(a, b) { return a - b; });
      }
      saveBookmarks(bm);
      renderBookmarkPanel();
      renderPages();
    }

    function renderBookmarkPanel() {
      const list = document.getElementById('bookmark-list');
      const bm = getBookmarks();

      if (bm.length === 0) {
        list.innerHTML = '<div class="bookmark-empty">No bookmarks yet.<br>Click the dog-ear on any page!</div>';
        return;
      }

      list.innerHTML = bm.map(function(page) {
        return '<div class="bookmark-item" onclick="window.__goToPage(' + page + ')">' +
          '<span>Page ' + page + '</span>' +
          '<button class="bookmark-item-remove" onclick="event.stopPropagation(); window.__removeBookmark(' + page + ')">&times;</button>' +
          '</div>';
      }).join('');
    }

    window.__goToPage = function(page) {
      currentPage = page;
      savePage(page);
      renderPages();
      updateCounter();
    };

    window.__removeBookmark = function(page) {
      let bm = getBookmarks();
      const idx = bm.indexOf(page);
      if (idx !== -1) bm.splice(idx, 1);
      saveBookmarks(bm);
      renderBookmarkPanel();
      renderPages();
    };

    // Render pages to canvas
    async function renderPages() {
      if (isRendering || !pdfDoc) return;
      isRendering = true;

      const viewport = document.getElementById('reader-viewport');
      viewport.innerHTML = '';

      const pagesToRender = [];
      pagesToRender.push(currentPage);

      // Two-page spread on desktop
      if (isDesktop && currentPage < totalPages) {
        pagesToRender.push(currentPage + 1);
      }

      for (const pageNum of pagesToRender) {
        try {
          const page = await pdfDoc.getPage(pageNum);
          const scale = calculateScale(page);
          const pdfViewport = page.getViewport({ scale: scale });

          const wrapper = document.createElement('div');
          wrapper.className = 'page-wrapper';

          const canvas = document.createElement('canvas');
          canvas.width = pdfViewport.width;
          canvas.height = pdfViewport.height;

          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport: pdfViewport }).promise;

          // Dog-ear bookmark indicator
          const dogEar = document.createElement('div');
          dogEar.className = 'dog-ear-indicator' + (isPageBookmarked(pageNum) ? ' bookmarked' : '');
          dogEar.title = isPageBookmarked(pageNum) ? 'Remove bookmark' : 'Bookmark this page';
          dogEar.addEventListener('click', function() {
            togglePageBookmark(pageNum);
          });

          wrapper.appendChild(canvas);
          wrapper.appendChild(dogEar);
          viewport.appendChild(wrapper);
        } catch(e) {
          console.error('Error rendering page ' + pageNum, e);
        }
      }

      isRendering = false;
      updateNavButtons();
    }

    function calculateScale(page) {
      const pdfViewport = page.getViewport({ scale: 1 });
      const availWidth = isDesktop ? (window.innerWidth - 100) / 2 : window.innerWidth - 40;
      const availHeight = window.innerHeight - 140;

      const scaleWidth = availWidth / pdfViewport.width;
      const scaleHeight = availHeight / pdfViewport.height;

      return Math.min(scaleWidth, scaleHeight, 2.5);
    }

    function updateCounter() {
      const endPage = isDesktop && currentPage < totalPages ? currentPage + 1 : currentPage;
      const text = isDesktop && currentPage < totalPages
        ? 'Pages ' + currentPage + '-' + endPage + ' of ' + totalPages
        : 'Page ' + currentPage + ' of ' + totalPages;
      document.getElementById('page-counter').textContent = text;
    }

    function updateNavButtons() {
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      const step = isDesktop ? 2 : 1;
      document.getElementById('next-btn').disabled = currentPage + step > totalPages;
    }

    // Navigation
    function goNext() {
      const step = isDesktop ? 2 : 1;
      if (currentPage + step <= totalPages) {
        animateFlip('left');
        currentPage += step;
        savePage(currentPage);
        setTimeout(function() { renderPages(); updateCounter(); }, 200);
      }
    }

    function goPrev() {
      const step = isDesktop ? 2 : 1;
      if (currentPage > 1) {
        animateFlip('right');
        currentPage = Math.max(1, currentPage - step);
        savePage(currentPage);
        setTimeout(function() { renderPages(); updateCounter(); }, 200);
      }
    }

    function animateFlip(direction) {
      const wrappers = document.querySelectorAll('.page-wrapper');
      wrappers.forEach(function(w) {
        w.classList.add('flip-' + direction);
      });
    }

    // Event listeners
    document.getElementById('next-btn').addEventListener('click', goNext);
    document.getElementById('prev-btn').addEventListener('click', goPrev);

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { goNext(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { goPrev(); }
    });

    // Bookmark panel toggle
    document.getElementById('bookmark-list-btn').addEventListener('click', function() {
      bookmarkPanelOpen = !bookmarkPanelOpen;
      document.getElementById('bookmark-panel').classList.toggle('open', bookmarkPanelOpen);
      this.classList.toggle('active', bookmarkPanelOpen);
      renderBookmarkPanel();
    });

    // Ambient mode toggle
    document.getElementById('ambient-btn').addEventListener('click', function() {
      ambientMode = !ambientMode;
      document.body.classList.toggle('ambient-mode', ambientMode);
      document.getElementById('ambient-overlay').classList.toggle('active', ambientMode);
      this.classList.toggle('active', ambientMode);
    });

    // Fullscreen toggle
    document.getElementById('fullscreen-btn').addEventListener('click', function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function() {});
      } else {
        document.exitFullscreen();
      }
    });

    // Responsive: switch between single/double page on resize
    window.addEventListener('resize', function() {
      const wasDesktop = isDesktop;
      isDesktop = window.innerWidth > 768;
      if (wasDesktop !== isDesktop && pdfDoc) {
        renderPages();
        updateCounter();
      }
    });

    // Load PDF
    async function loadPdf() {
      if (!pdfUrl) {
        document.getElementById('reader-viewport').innerHTML = '<div class="reader-error">' +
          '<h2>Walang PDF URL</h2>' +
          '<p>No book file specified. Go back to the bookshelf and pick one!</p>' +
          '<a href="bookshelf.html" class="back-btn" style="margin-top:1rem;display:inline-block">&larr; Back to Shelf</a>' +
          '</div>';
        return;
      }

      try {
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;

        // Restore saved page
        currentPage = Math.min(getSavedPage(), totalPages);

        updateCounter();
        renderBookmarkPanel();
        await renderPages();
      } catch(err) {
        console.error('PDF load error:', err);
        document.getElementById('reader-viewport').innerHTML = '<div class="reader-error">' +
          '<h2>Hindi ma-load yung book</h2>' +
          '<p>Could not open this PDF. Baka may issue sa file or sa connection.</p>' +
          '<p style="font-size:0.75rem;color:#7a5c3e;margin-top:0.5rem">' + (err.message || '') + '</p>' +
          '<a href="bookshelf.html" class="back-btn" style="margin-top:1rem;display:inline-block">&larr; Back to Shelf</a>' +
          '</div>';
      }
    }

    loadPdf();
  </script>
</body>
</html>
