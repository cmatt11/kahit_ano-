<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader - Carla</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Reader Page - Dark/Cozy Reading Atmosphere */
    .reader-page {
      min-height: 100vh;
      background: #2c1810;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .reader-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.5rem;
      background: #1f120b;
      border-bottom: 1px solid rgba(196, 155, 112, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .reader-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #c49b70;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: all 0.2s ease;
      background: rgba(196, 155, 112, 0.08);
      border: 1px solid rgba(196, 155, 112, 0.15);
    }

    .reader-back-btn:hover {
      background: rgba(196, 155, 112, 0.15);
      color: #e8c9a0;
    }

    .reader-title-bar {
      font-size: 0.85rem;
      color: #9b7a5a;
      max-width: 50%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-page-indicator {
      font-size: 0.8rem;
      color: #7a5c3e;
      font-style: italic;
    }

    /* Book Container - the "physical book" feel */
    .reader-book-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Warm ambient light effect */
    .reader-book-wrapper::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(255, 200, 100, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .reader-book-container {
      width: 100%;
      max-width: 900px;
      height: calc(100vh - 140px);
      position: relative;
      perspective: 1500px;
    }

    /* The book "page" that flips */
    .reader-page-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
      transform-origin: center center;
      border-radius: 4px;
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.4),
        0 0 80px rgba(0, 0, 0, 0.2),
        inset 0 0 0 1px rgba(196, 155, 112, 0.1);
    }

    /* Page flip animation states */
    .reader-page-inner.flip-forward {
      animation: flipForward 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .reader-page-inner.flip-backward {
      animation: flipBackward 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    @keyframes flipForward {
      0% {
        transform: rotateY(0deg);
      }
      50% {
        transform: rotateY(-12deg) scale(0.97);
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.3), 0 0 60px rgba(0, 0, 0, 0.2);
      }
      100% {
        transform: rotateY(0deg);
      }
    }

    @keyframes flipBackward {
      0% {
        transform: rotateY(0deg);
      }
      50% {
        transform: rotateY(12deg) scale(0.97);
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.3), 0 0 60px rgba(0, 0, 0, 0.2);
      }
      100% {
        transform: rotateY(0deg);
      }
    }

    /* Book spine on the left */
    .reader-spine {
      position: absolute;
      left: -12px;
      top: 5%;
      bottom: 5%;
      width: 12px;
      background: linear-gradient(to right, #3d2514, #5c3820, #4a2e18);
      border-radius: 3px 0 0 3px;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    .reader-spine::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 2px;
      height: 100%;
      background: rgba(255, 255, 255, 0.05);
    }

    /* PDF iframe area */
    .reader-content-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 4px;
      background: #fff;
    }

    /* Navigation Controls */
    .reader-nav-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      background: #1f120b;
      border-top: 1px solid rgba(196, 155, 112, 0.1);
    }

    .reader-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      background: rgba(196, 155, 112, 0.1);
      border: 1px solid rgba(196, 155, 112, 0.2);
      color: #c49b70;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .reader-nav-btn:hover {
      background: rgba(196, 155, 112, 0.18);
      border-color: rgba(196, 155, 112, 0.35);
      color: #e8c9a0;
      transform: translateY(-1px);
    }

    .reader-nav-btn:active {
      transform: translateY(0);
    }

    .reader-nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .reader-nav-hint {
      font-size: 0.75rem;
      color: #6b4f37;
      font-style: italic;
    }

    /* Loading State */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #c49b70;
      text-align: center;
      padding: 2rem;
    }

    .reader-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(196, 155, 112, 0.2);
      border-top-color: #c49b70;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.2rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .reader-loading p {
      font-size: 1rem;
      margin-bottom: 0.4rem;
    }

    .reader-loading .reader-loading-sub {
      font-size: 0.85rem;
      color: #7a5c3e;
      font-style: italic;
    }

    /* Error State */
    .reader-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #c49b70;
      text-align: center;
      padding: 2rem;
    }

    .reader-error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .reader-error p {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .reader-error .reader-error-sub {
      font-size: 0.85rem;
      color: #7a5c3e;
      font-style: italic;
    }

    .reader-error-link {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: rgba(196, 155, 112, 0.12);
      border: 1px solid rgba(196, 155, 112, 0.25);
      color: #c49b70;
      border-radius: 8px;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .reader-error-link:hover {
      background: rgba(196, 155, 112, 0.2);
      color: #e8c9a0;
    }

    /* Fullscreen support */
    .reader-fullscreen-btn {
      background: none;
      border: none;
      color: #7a5c3e;
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 4px;
      font-size: 1.1rem;
      transition: color 0.2s ease;
    }

    .reader-fullscreen-btn:hover {
      color: #c49b70;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .reader-book-wrapper {
        padding: 0.5rem;
      }

      .reader-book-container {
        height: calc(100vh - 120px);
        max-width: 100%;
      }

      .reader-spine {
        display: none;
      }

      .reader-topbar {
        padding: 0.6rem 1rem;
      }

      .reader-title-bar {
        display: none;
      }

      .reader-nav-controls {
        padding: 0.8rem 1rem;
        gap: 1rem;
      }

      .reader-nav-btn {
        padding: 0.5rem 0.9rem;
        font-size: 0.8rem;
      }

      .reader-nav-hint {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .reader-back-btn span {
        display: none;
      }

      .reader-page-indicator {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="reader-page" id="reader-page">
    <!-- Top Bar -->
    <div class="reader-topbar">
      <a href="bookshelf.html" class="reader-back-btn" id="reader-back-btn">
        &larr; <span>Back to Shelf</span>
      </a>
      <div class="reader-title-bar" id="reader-title-bar"></div>
      <button class="reader-fullscreen-btn" id="reader-fullscreen-btn" title="Fullscreen">&#x26F6;</button>
    </div>

    <!-- Book Container -->
    <div class="reader-book-wrapper">
      <div class="reader-book-container" id="reader-book-container">
        <div class="reader-spine"></div>
        <div class="reader-page-inner" id="reader-page-inner">
          <!-- Loading state shown first -->
          <div class="reader-loading" id="reader-loading">
            <div class="reader-loading-spinner"></div>
            <p>Bukas na bukas... loading</p>
            <span class="reader-loading-sub">sandali lang, kinukuha pa yung libro</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigation Controls -->
    <div class="reader-nav-controls">
      <button class="reader-nav-btn" id="reader-prev-btn" title="Previous">
        &larr; Prev
      </button>
      <span class="reader-nav-hint">scroll or use buttons to navigate</span>
      <button class="reader-nav-btn" id="reader-next-btn" title="Next">
        Next &rarr;
      </button>
    </div>
  </div>

  <script>
    (function() {
      // Parse URL parameters
      var params = new URLSearchParams(window.location.search);
      var fileUrl = params.get('url');
      var bookTitle = params.get('title') || '';

      // Elements
      var pageInner = document.getElementById('reader-page-inner');
      var loadingEl = document.getElementById('reader-loading');
      var titleBar = document.getElementById('reader-title-bar');
      var prevBtn = document.getElementById('reader-prev-btn');
      var nextBtn = document.getElementById('reader-next-btn');
      var fullscreenBtn = document.getElementById('reader-fullscreen-btn');
      var bookContainer = document.getElementById('reader-book-container');

      // Set title in topbar
      if (bookTitle) {
        titleBar.textContent = bookTitle;
        document.title = bookTitle + ' - Reader';
      }

      // Check if we have a URL to load
      if (!fileUrl) {
        showError();
        return;
      }

      // Detect if it's a PDF
      var isPdf = fileUrl.toLowerCase().indexOf('.pdf') !== -1 ||
                  fileUrl.toLowerCase().indexOf('pdf') !== -1;

      // Load the content
      loadContent(fileUrl, isPdf);

      // Flip animation on nav buttons
      var isAnimating = false;

      prevBtn.addEventListener('click', function() {
        triggerFlip('backward');
      });

      nextBtn.addEventListener('click', function() {
        triggerFlip('forward');
      });

      function triggerFlip(direction) {
        if (isAnimating) return;
        isAnimating = true;

        var animClass = direction === 'forward' ? 'flip-forward' : 'flip-backward';
        pageInner.classList.add(animClass);

        // Try to scroll the iframe content
        try {
          var iframe = pageInner.querySelector('iframe');
          if (iframe && iframe.contentWindow) {
            var scrollAmount = direction === 'forward' ? 600 : -600;
            iframe.contentWindow.scrollBy({ top: scrollAmount, behavior: 'smooth' });
          }
        } catch (e) {
          // Cross-origin iframe, can't scroll - that's okay
        }

        setTimeout(function() {
          pageInner.classList.remove(animClass);
          isAnimating = false;
        }, 650);
      }

      // Fullscreen toggle
      fullscreenBtn.addEventListener('click', function() {
        if (!document.fullscreenElement) {
          var el = document.getElementById('reader-page');
          if (el.requestFullscreen) {
            el.requestFullscreen();
          } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          }
        }
      });

      // Keyboard navigation
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'PageDown') {
          e.preventDefault();
          triggerFlip('forward');
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault();
          triggerFlip('backward');
        } else if (e.key === 'Escape') {
          window.location.href = 'bookshelf.html';
        }
      });

      function loadContent(url, pdf) {
        // Remove loading after a brief moment, show iframe
        var iframe = document.createElement('iframe');
        iframe.className = 'reader-content-frame';
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('loading', 'lazy');

        // For PDFs, some browsers need a direct URL
        // For non-PDF, just embed as-is
        iframe.src = url;

        iframe.onload = function() {
          if (loadingEl && loadingEl.parentNode) {
            loadingEl.remove();
          }
        };

        // Fallback: remove loading after 5 seconds regardless
        setTimeout(function() {
          if (loadingEl && loadingEl.parentNode) {
            loadingEl.remove();
          }
        }, 5000);

        // Add iframe to the page
        pageInner.appendChild(iframe);
      }

      function showError() {
        if (loadingEl) loadingEl.remove();

        var errorDiv = document.createElement('div');
        errorDiv.className = 'reader-error';
        errorDiv.innerHTML = '<div class="reader-error-icon">&#128214;</div>' +
          '<p>Ay, walang file na na-detect.</p>' +
          '<span class="reader-error-sub">baka mali yung link, or baka wala talagang libro dito lol</span>' +
          '<a href="bookshelf.html" class="reader-error-link">&larr; Balik sa bookshelf</a>';
        pageInner.appendChild(errorDiv);

        // Hide nav since nothing to navigate
        document.querySelector('.reader-nav-controls').style.display = 'none';
      }

    })();
  </script>
</body>
</html>
