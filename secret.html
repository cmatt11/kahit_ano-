<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .secret-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--brown);
      padding: 4rem 2rem;
      text-align: center;
    }

    .secret-content {
      max-width: 500px;
    }

    .secret-content h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--white);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .secret-content p {
      color: var(--brown-lighter);
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .secret-divider {
      width: 60px;
      height: 2px;
      background: var(--pink);
      margin: 2.5rem auto;
      opacity: 0.6;
    }

    .secret-fortune {
      margin-top: 2rem;
    }

    .secret-fortune-display {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .secret-fortune-text {
      color: var(--pink-light);
      font-size: 1.15rem;
      font-style: italic;
      line-height: 1.7;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .secret-fortune-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .secret-fortune-btn {
      background: transparent;
      border: 2px solid var(--pink);
      color: var(--pink-light);
      border-radius: 30px;
      padding: 0.75rem 1.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
    }

    .secret-fortune-btn:hover {
      background: var(--pink);
      color: var(--brown);
      transform: translateY(-2px);
    }

    .secret-back {
      margin-top: 3rem;
      display: inline-block;
      color: var(--brown-light);
      font-size: 0.85rem;
      transition: color var(--transition);
    }

    .secret-back:hover {
      color: var(--pink-light);
    }
  </style>
</head>
<body>
  <div class="secret-page">
    <div class="secret-content">
      <h1>You found it. Nice. 👀</h1>
      <p>This page is for the curious ones. If you're here, you're paying attention. And I appreciate that.</p>

      <div class="secret-divider"></div>

      <div class="secret-fortune">
        <p style="color: var(--brown-lighter); font-size: 0.95rem; margin-bottom: 1rem;">a fortune, just for you:</p>
        <div class="secret-fortune-display">
          <p class="secret-fortune-text" id="secret-fortune-text"></p>
        </div>
        <button class="secret-fortune-btn" id="secret-fortune-btn">crack open a fortune 🥠</button>
      </div>

      <a href="index.html" class="secret-back">&larr; go back (or don't, I'm not your mom)</a>
    </div>
  </div>

  <script src="cms-config.js"></script>
  <script src="script.js"></script>
  <script src="translate.js"></script>
  <script>
    (function() {
      var fortunes = [
        "You were meant to find this. No coincidences.",
        "Ang ganda mo today. I don't make the rules.",
        "The people who get you? They're coming. Patience.",
        "Your energy is rare. Not everyone deserves access.",
        "You don't need to explain yourself to people who won't listen anyway.",
        "Somewhere out there, someone is thinking about you right now. Legit.",
        "Yung version mo na kinakatakutan mo? That's the one people need.",
        "Hindi ka boring. You're just surrounded by people na hindi ka bet.",
        "Your next chapter is going to make your past feel like a rough draft.",
        "Ang weird mo. In the best way. Never change.",
        "You're not lost. You're exploring. There's a difference.",
        "The fact that you found this page says something about you. Good things.",
        "Pakinggan mo yung gut feeling mo. It's been right this whole time.",
        "You deserve the same love you keep giving everyone else.",
        "Isa kang plot twist na hindi nila inexpect. Own it."
      ];

      var btn = document.getElementById('secret-fortune-btn');
      var text = document.getElementById('secret-fortune-text');
      var lastIndex = -1;

      btn.addEventListener('click', function() {
        var index;
        do {
          index = Math.floor(Math.random() * fortunes.length);
        } while (index === lastIndex && fortunes.length > 1);
        lastIndex = index;

        text.classList.remove('show');
        void text.offsetWidth;
        text.textContent = fortunes[index];
        text.classList.add('show');
      });
    })();
  </script>
</body>
</html>
